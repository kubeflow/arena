version: 0.1.0
name: test-secret
framework:
  name: pytorch
image: pytorch/pytorch:2.1
run: ls /root/.ssh/ && echo "Secret mounted successfully"
worker:
  replicas: 1
  resources:
    cpu: 1
    memory: 1Gi
storages:
  - name: creds
    secret: db-credentials
    mount_path: /secrets
  - name: ssh-key
    secret: ssh-keys
    key: id_rsa
    mount_path: /root/.ssh/id_rsa
