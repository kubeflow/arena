version: 0.1.0
name: test-configmap
framework:
  name: pytorch
image: docker.io/pytorch/pytorch:2.1
run: cat /etc/config/settings.yaml
worker:
  replicas: 1
  resources:
    cpu: 1
    memory: 1Gi
storages:
  - name: configs
    configmap: app-config
    mount_path: /etc/config
  - name: single-file
    configmap: app-config
    key: settings.yaml
    mount_path: /app/settings.yaml
