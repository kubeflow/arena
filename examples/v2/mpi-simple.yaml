# IMPORTANT: Replace the image below with your own training image.
# Use a fully qualified registry path, e.g. docker.io/your-org/your-image:tag.
version: 0.1.0
name: mpi-example
image: docker.io/mpioperator/mpi-test:openmpi-4.1.0
framework:
  name: mpi
  options:
    slots_per_worker: 4
    mpi_implementation: OpenMPI
    launcher_creation_policy: AtStartup
worker:
  replicas: 4
  resources:
    cpu: "2"
    memory: "8Gi"
run: mpirun -n 16 python train.py
